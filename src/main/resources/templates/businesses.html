<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-3">


    <div class="text-center text-white py-5 hero-section rounded-4">

        <h2 class="display-4 fw-bold">
            Găsește furnizorii potriviți pentru evenimentul tău
        </h2>

    </div>

</div>

<!--CATEGORIES-->
<div class="container pb-2">

    <div class="mb-4">
        <h2 class="fw-bold mb-1 text-muted">
            Categorii
        </h2>

        <p class="text-muted mb-0">
            Alege o categorie și explorează serviciile disponibile
        </p>
    </div>

    <div class="alert alert-warning text-center"
         th:if="${#maps.isEmpty(profilesByCategory)}">
        Nu exist[ categorii.
    </div>

    <div class="row g-4">

        <div class="col-6 col-lg-4"
             th:each="categoryGroup : ${profilesByCategory}">

            <a class="category-card-link"
               th:href="@{/businesses/category/{category}(category=${categoryGroup.key})}">

                <div class="card border-0 shadow-lg h-100 category-card">

                    <div class="category-card-image-wrapper">

                        <img class="category-card-image"
                             th:if="${categoryGroup.value[0].imagePath != null}"
                             th:src="@{${categoryGroup.value[0].imagePath}}">

                        <img class="category-card-image"
                             src="https://via.placeholder.com/500x300"
                             th:if="${categoryGroup.value[0].imagePath == null}">

                        <div class="category-card-overlay"></div>

                        <div class="category-card-content">

                        <span class="badge bg-light text-dark px-3 py-2 mb-3">
                            Categorie
                        </span>

                            <h3 class="fw-bold text-white mb-2"
                                th:text="${categoryGroup.key.displayName}">
                                Categorie
                            </h3>

                            <p class="text-white-50 mb-0">
                                <span th:text="${#lists.size(categoryGroup.value)}"></span>
                                <span th:text="${#lists.size(categoryGroup.value) == 1 ? 'serviciu disponibil' : 'servicii disponibile'}"></span>
                            </p>

                        </div>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const savedScrollPosition = sessionStorage.getItem("scrollPosition");

        if (savedScrollPosition !== null) {
            window.scrollTo(0, parseInt(savedScrollPosition));
            sessionStorage.removeItem("scrollPosition");
        }

        document.querySelectorAll(".favorite-form").forEach(form => {
            form.addEventListener("submit", function () {
                sessionStorage.setItem("scrollPosition", window.scrollY);
            });
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const navLinks = document.querySelectorAll(".navbar-collapse .nav-link");
        const navbarCollapse = document.querySelector(".navbar-collapse");

        navLinks.forEach(link => {
            link.addEventListener("click", () => {
                if (navbarCollapse.classList.contains("show")) {
                    const bsCollapse = new bootstrap.Collapse(navbarCollapse);
                    bsCollapse.hide();
                }
            });
        });
    });
</script>

</body>
</html>
