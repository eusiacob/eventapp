<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">


    <div class="text-center text-white py-5 mb-5 hero-section rounded-4">

        <h1 class="display-4 fw-bold">
            Find the Perfect Event Services
        </h1>

        <p class="lead">
            DJs, photographers, restaurants, venues and more.
        </p>

    </div>

    <!--SEARCH BAR-->
    <form action="/businesses"
          class="row align-items-end opacity-75"
          method="get">

        <div class="col">
            <input class="form-control"
                   name="keyword"
                   placeholder="Name of Business"
                   th:value="${keyword}"
                   type="text">
        </div>

        <div class="col">
            <select class="form-select" name="category">

                <option value="">All Categories</option>

                <option th:each="cat : ${categories}"
                        th:selected="${cat == category}"
                        th:text="${cat}"
                        th:value="${cat}">
                </option>

            </select>
        </div>

        <div class="col">
            <select class="form-select" name="city">

                <option value="">All Cities</option>

                <option th:each="c : ${cities}"
                        th:selected="${c == city}"
                        th:text="${c}"
                        th:value="${c}">
                </option>

            </select>
        </div>

        <div class="col-auto">
            <button class="btn btn-outline-dark w-100"
                    type="submit">
                Search
            </button>
        </div>

    </form>

</div>
<!--BUSINESSES-->
<div class="container mt-4">

    <div class="row g-4">

        <div class="alert alert-warning"
             th:if="${#lists.isEmpty(businesses)}">
            No businesses found.
        </div>

        <div class="col-md-6 col-lg-4"
             th:each="b : ${businesses}">

            <div class="card border-0 shadow-lg h-100 business-card position-relative">

                <!-- Favorite heart -->
                <div class="favorite-heart-wrapper"
                     sec:authorize="isAuthenticated()">

                    <!-- Dacă NU este favorit -->
                    <form class="favorite-form"
                          th:if="${!favoriteIds.contains(b.id)}"
                          th:action="@{/favorites/add/{id}(id=${b.id})}"
                          method="post">

                        <button type="submit"
                                class="favorite-heart empty-heart"
                                title="Add to favorites">
                            ♡
                        </button>

                    </form>

                    <!-- Dacă ESTE favorit -->
                    <form class="favorite-form"
                          th:if="${favoriteIds.contains(b.id)}"
                          th:action="@{/favorites/remove/{id}(id=${b.id})}"
                          method="post">

                        <button type="submit"
                                class="favorite-heart filled-heart"
                                title="Remove from favorites">
                            ♥
                        </button>

                    </form>

                </div>

                <!-- IMAGE -->
                <div class="position-relative">
                    <img class="card-img-top business-image"
                         th:if="${b.imagePath != null}"
                         th:src="@{${b.imagePath}}">

                    <img class="card-img-top business-image"
                         th:if="${b.imagePath == null}">

                    <span class="badge bg-dark position-absolute top-0 start-0 m-3 px-3 py-2">
            <span th:text="${b.category}"></span>
        </span>
                </div>

                <div class="card-body d-flex flex-column">

                    <h4 class="fw-bold mb-2" th:text="${b.name}"></h4>

                    <p class="text-muted mb-2">
                        📍 <span th:text="${b.city}"></span>
                    </p>

                    <p class="text-secondary flex-grow-1" th:text="${b.description}"></p>

                    <a class="btn btn-dark mt-3"
                       th:href="@{/business/{id}(id=${b.id})}">
                        View Profile
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const savedScrollPosition = sessionStorage.getItem("scrollPosition");

        if (savedScrollPosition !== null) {
            window.scrollTo(0, parseInt(savedScrollPosition));
            sessionStorage.removeItem("scrollPosition");
        }

        document.querySelectorAll(".favorite-form").forEach(form => {
            form.addEventListener("submit", function () {
                sessionStorage.setItem("scrollPosition", window.scrollY);
            });
        });
    });
</script>

</body>
</html>
