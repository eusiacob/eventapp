<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">


    <div class="text-center text-white py-5 mb-5 hero-section rounded-4">

        <h1 class="display-4 fw-bold">
            Find the Perfect Event Services
        </h1>

        <p class="lead">
            DJs, photographers, restaurants, venues and more.
        </p>

    </div>

    <!--    SEARCH BAR-->
    <form action="/businesses"
          class="row align-items-end opacity-75"
          method="get">

        <div class="col">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Name of Business"
                   th:value="${keyword}">
        </div>

        <div class="col">
            <select name="category" class="form-select">

                <option value="">All Categories</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}"
                        th:selected="${cat == category}">
                </option>

            </select>
        </div>

        <div class="col">
            <select name="city" class="form-select">

                <option value="">All Cities</option>

                <option th:each="c : ${cities}"
                        th:value="${c}"
                        th:text="${c}"
                        th:selected="${c == city}">
                </option>

            </select>
        </div>

        <div class="col-auto">
            <button class="btn btn-outline-dark w-100"
                    type="submit">
                Search
            </button>
        </div>

    </form>

</div>
<!--BUSINESSES-->
<div class="container mt-4">

    <div class="row g-4">

        <div th:if="${#lists.isEmpty(businesses)}"
             class="alert alert-warning">
            No businesses found.
        </div>

        <div class="col-md-6 col-lg-4"
             th:each="b : ${businesses}">

            <div class="card border-0 shadow-lg h-100 business-card">

                <!-- IMAGE -->
                <div class="position-relative">

                    <img th:if="${b.imagePath != null}"
                         th:src="@{${b.imagePath}}"
                         class="card-img-top business-image">

                    <img th:if="${b.imagePath == null}"
                         src="https://via.placeholder.com/500x300"
                         class="card-img-top business-image">

                    <!-- CATEGORY BADGE -->
                    <span class="badge bg-dark position-absolute top-0 end-0 m-3 px-3 py-2">
            <span th:text="${b.category}"></span>
        </span>

                </div>

                <!-- BODY -->
                <div class="card-body d-flex flex-column">

                    <h4 class="fw-bold mb-2"
                        th:text="${b.name}">
                    </h4>

                    <p class="text-muted mb-2">
                        📍 <span th:text="${b.city}"></span>
                    </p>

                    <p class="text-secondary flex-grow-1"
                       th:text="${b.description}">
                    </p>

                    <a th:href="@{/business/{id}(id=${b.id})}"
                       class="btn btn-dark mt-3">
                        View Profile
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
