<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body style="overflow: auto" class="bodyLR">

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- LEFT SIDE (60%) -->
        <div class="col-lg-7 d-none d-lg-flex align-items-center p-5 text-white"
             style="background: rgba(0,0,0,0.65);">

            <div>
                <h1 class="mb-4">EventApp</h1>

                <p class="lead">
                    Creează un cont și descoperă cei mai buni furnizori pentru nunți, botezuri și evenimente speciale.
                </p>

                <hr class="bg-light">

                <div class="row mt-4">

                    <div class="col-4 text-center">
                        <h3>500+</h3>
                        <p>Business-uri</p>
                    </div>

                    <div class="col-4 text-center">
                        <h3>1200+</h3>
                        <p>Evenimente</p>
                    </div>

                    <div class="col-4 text-center">
                        <h3>4.8★</h3>
                        <p>Rating mediu</p>
                    </div>

                </div>

                <hr class="bg-light">

                <p class="mt-3">
                    Totul într-o singură platformă simplă și rapidă.
                </p>
            </div>

        </div>

        <!-- RIGHT SIDE (40%) -->
        <div class="col-lg-5 d-flex align-items-center justify-content-center p-4">

            <div class="card shadow opacity-75 p-4 w-100" style="max-width: 420px;">

                <h2 class="text-center mb-4">Register</h2>

                <form method="post"
                      th:action="@{/register}"
                      th:object="${user}">

                    <div class="mb-2">
                        <input class="form-control"
                               placeholder="First name"
                               th:field="*{firstName}"
                               type="text">
                        <div class="text-danger small"
                             th:errors="*{firstName}"
                             th:if="${#fields.hasErrors('firstName')}">
                        </div>
                    </div>

                    <div class="mb-2">
                        <input class="form-control"
                               placeholder="Last name"
                               th:field="*{lastName}"
                               type="text">
                        <div class="text-danger small"
                             th:errors="*{lastName}"
                             th:if="${#fields.hasErrors('lastName')}"></div>
                    </div>

                    <div class="mb-2">
                        <input class="form-control"
                               placeholder="Email"
                               th:field="*{email}"
                               type="text">
                        <div class="text-danger small"
                             th:errors="*{email}"
                             th:if="${#fields.hasErrors('email')}"></div>
                    </div>

                    <div class="mb-2">
                        <input class="form-control"
                               placeholder="Password"
                               th:field="*{password}"
                               type="password">
                        <div class="text-danger small"
                             th:errors="*{password}"
                             th:if="${#fields.hasErrors('password')}"></div>
                    </div>

                    <div class="mb-3">
                        <input class="form-control"
                               type="password"
                               th:field="*{confirmPassword}"
                               placeholder="Confirm Password">

                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('confirmPassword')}"
                             th:errors="*{confirmPassword}">
                        </div>
                    </div>

                    <div class="mb-2">
                        <input class="form-control"
                               placeholder="Phone number - 07X XXX XXX"
                               th:field="*{phone}"
                               type="text">
                        <div class="text-danger small"
                             th:errors="*{phone}"
                             th:if="${#fields.hasErrors('phone')}"></div>
                    </div>

                    <div class="mb-3">
                        <select class="form-control"
                                th:field="*{role}">
                            <option value="USER">User</option>
                            <option value="BUSINESS">Business</option>
                        </select>
                    </div>

                    <button class="btn btn-dark w-100" type="submit">
                        Create account
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Already have an account?
                    <a href="/login">Login</a>
                </p>

            </div>

        </div>

    </div>
</div>

</body>
</html>
