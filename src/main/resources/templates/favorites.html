<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h1 class="mb-0 text-dark">
        Favorites
    </h1>

    <!-- EMPTY STATE -->
    <div class="mt-3 alert alert-info opacity-75"
         th:if="${#lists.isEmpty(favorites)}">
        You don't have any favorite business yet.
    </div>

    <div class="mt-3 row g-4">

        <div class="col-md-6 col-lg-4"
             th:each="p : ${favorites}">

            <div class="card shadow border-0 h-100">

                <img th:src="@{${p.imagePath}}"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;">

                <div class="card-body">

                    <h4 th:text="${p.name}"></h4>

                    <p th:text="${p.city}"></p>

                    <a th:href="@{/business/{id}(id=${p.id})}"
                       class="btn btn-dark">
                        View
                    </a>

                    <form th:action="@{/favorites/remove/{id}(id=${p.id})}"
                          method="post"
                          class="mt-2">

                        <button class="btn btn-outline-danger">
                            Remove
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
