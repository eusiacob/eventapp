<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3">

    <h1 class="mb-0 text-dark">
        Favorite
    </h1>

    <!-- EMPTY STATE -->
    <div class="mt-3 alert alert-info opacity-75"
         th:if="${#lists.isEmpty(favorites)}">
        Nu ai servicii favorite.
    </div>


    <!--    CARDS-->
    <div class="mt-3 row g-4">

        <div class="col-md-6 col-lg-4"
             th:each="p : ${favorites}">

            <a class="business-card-link" th:href="@{/business/{id}(id=${p.id})}">
                <div class="card shadow border-0 h-100">

                    <img class="card-img-top"
                         style="height:250px; object-fit:cover;"
                         th:src="@{${p.imagePath}}">

                    <div class="card-body">

                        <h4 th:text="${p.name}"></h4>

                        <p th:text="${p.city}"></p>

                        <form class="mt-2"
                              method="post"
                              th:action="@{/favorites/remove/{id}(id=${p.id})}">

                            <button class="btn btn-outline-danger">
                                Șterge
                            </button>

                        </form>

                    </div>

                </div>
            </a>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
