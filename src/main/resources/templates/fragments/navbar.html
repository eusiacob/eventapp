<nav xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark px-3 sticky-top">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/businesses">
            EventApp
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2 text-center">

                <li class="nav-item" sec:authorize="hasRole('BUSINESS')">
                    <a class="nav-link" href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/favorites">
                        Favorites
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" href="/login">
                        Login
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" href="/register">
                        Register
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn btn-outline-light btn-sm mt-1"
                                type="submit">
                            Logout
                        </button>
                    </form>
                </li>

            </ul>

        </div>

    </div>

</nav>
