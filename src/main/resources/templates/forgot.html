<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Forgot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body class="auth-page" style="padding-top: 0 !important;">

<div class="auth-wrapper">

    <div class="container">

        <div class="row align-items-center justify-content-center g-5">

            <!-- LEFT TEXT - hidden on mobile -->
            <div class="col-lg-6 d-none d-lg-block">

                <div class="auth-info">

                    <span class="badge bg-light text-dark px-3 py-2 mb-4">
                        Join EventApp
                    </span>

                    <h1 class="fw-bold mb-4">
                        Create your account and start discovering event services
                    </h1>

                    <p>
                        Register as a user to save favorites and send requests,
                        or create a business account to promote your services.
                    </p>

                </div>

            </div>

            <!-- REGISTER CARD -->
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="auth-card">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold mb-2 text-dark">
                            Recuperare parolă
                        </h2>

                    </div>

                    <form method="post"
                          th:action="@{/forgot}">

                        <div class="row g-3">

                            <div class="col-12">
                                <input class="form-control"
                                       placeholder="Email"
                                       type="email">
                            </div>

                            <div class="col-12">
                                <button class="btn btn-dark w-100 mt-2"
                                        type="submit">
                                    Recuperare parola
                                </button>
                            </div>

                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <a class="auth-link"
                           href="/login">
                            Intră în cont
                        </a>

                    </div>

                    <div class="text-center mt-3">
                        <a class="auth-link"
                           href="/businesses">
                            Continuă ca vizitator
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
