<!DOCTYPE html>
<html lang="en"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <title th:text="${selectedCategory.displayName}"></title>

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="app-bg">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3">

    <!-- SEARCH -->
    <form class="search-card card p-4 mt-4 shadow-sm border-0"
          method="get"
          th:action="@{/businesses/category/{category}(category=${selectedCategory})}">

        <div class="row g-3 align-items-end customMargin">

            <div class="col-12 col-lg-3">
                <label class="form-label">Caută după nume</label>
                <input class="form-control"
                       name="keyword"
                       placeholder="Nume serviciu"
                       th:value="${keyword}"
                       type="text">
            </div>

            <div class="col-12 col-lg-3">
                <label class="form-label">Județ</label>
                <select class="form-select" name="city">
                    <option value="">Toate județele</option>
                    <option th:each="c : ${cities}"
                            th:selected="${c == city}"
                            th:text="${c}"
                            th:value="${c}">
                    </option>
                </select>
            </div>

            <div class="col-12 col-lg-3">
                <label class="form-label">Data eveniment</label>
                <input class="form-control"
                       name="eventDate"
                       placeholder="Data de eveniment"
                       th:value="${eventDate}"
                       type="date">
            </div>

            <div class="col-12 col-lg-3 d-grid">
                <button class="btn btn-dark" type="submit">
                    Caută
                </button>
            </div>

        </div>
    </form>

    <div class="alert alert-warning text-center mt-4"
         th:if="${#lists.isEmpty(profiles)}">
        Nici un serviciu găsit.
    </div>

    <!--    CARDS-->

    <div class="row g-4 mt-2">

        <div class="col-12 col-md-6 col-lg-4"
             th:each="p : ${profiles}">

            <div class="card border-0 shadow-lg h-100 business-card position-relative clickable-card"
                 th:data-url="@{/business/{id}(id=${p.id})}">

                <!-- Favorite heart -->
                <div class="favorite-heart-wrapper"
                     sec:authorize="isAuthenticated()">

                    <button class="favorite-heart ajax-favorite-btn"
                            th:classappend="${favoriteIds.contains(p.id)} ? ' filled-heart' : ' empty-heart'"
                            th:data-business-id="${p.id}"
                            th:data-favorite="${favoriteIds.contains(p.id)}"
                            type="button">
                        <span th:text="${favoriteIds.contains(p.id)} ? '♥' : '♡'"></span>

                    </button>

                </div>

                <div class="position-relative">

                    <img class="card-img-top business-image"
                         loading="lazy"
                         th:if="${p.imagePath != null}"
                         th:src="@{${p.imagePath}}">

                    <img class="card-img-top business-image"
                         loading="lazy"
                         src="https://i.ibb.co/d4nzt6TB/Image-not-found.png"
                         th:if="${p.imagePath == null}">

                    <span class="badge bg-dark position-absolute top-0 start-0 m-3 px-3 py-2"
                          th:text="${p.category.displayName}">
                    </span>

                </div>

                <div class="card-body d-flex flex-column">

                    <h4 class="fw-bold mb-2"
                        th:text="${p.name}">
                    </h4>

                    <p class="text-muted mb-2">
                        📍 <span th:text="${p.city}"></span>
                    </p>

                    <div class="mb-2">

                        <span class="text-muted" th:if="${p.reviewCount == 0}">
                            Nici o recenzie.
                        </span>

                        <span th:if="${p.reviewCount > 0}">
                            <span class="text-warning">★</span>

                            <strong th:text="${#numbers.formatDecimal(p.averageRating, 1, 1)}"></strong>

                            <span class="text-muted">
                                (<span th:text="${p.reviewCount}"></span>
                                <span th:text="${p.reviewCount == 1 ? 'recenzie' : 'recenzii'}"></span>)
                            </span>
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<!--ADD/REMOVE FAVORITES MESSAGE-->
<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div aria-atomic="true"
         aria-live="assertive"
         class="toast align-items-center bg-success border-0"
         id="favoriteToast"
         role="alert">

        <div class="d-flex">

            <div class="toast-body"
                 id="favoriteToastMessage">
                Favorite actualizate.
            </div>

            <button aria-label="Close"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"
                    type="button">
            </button>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<!--Imports-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!--ADD/REMOVE FROM FAVORITES-->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

        function showFavoriteToast(message) {
            const toastElement = document.getElementById("favoriteToast");
            const toastMessage = document.getElementById("favoriteToastMessage");

            if (!toastElement || !toastMessage) {
                return;
            }

            toastMessage.textContent = message;

            const toast = new bootstrap.Toast(toastElement, {
                delay: 1800
            });

            toast.show();
        }

        document.querySelectorAll(".ajax-favorite-btn").forEach(button => {
            button.addEventListener("click", function (event) {
                event.stopPropagation();

                const businessId = this.dataset.businessId;

                axios.post(`/favorites/toggle/${businessId}`, {}, {
                    headers: csrfHeader && csrfToken ? {
                        [csrfHeader]: csrfToken
                    } : {}
                })
                    .then(response => {
                        const isFavorite = response.data.favorite;

                        const favoriteCountBadge = document.getElementById("favoriteCountBadge");
                        const favoriteCountBadgeMobile = document.getElementById("favoriteCountBadgeMobile");

                        if (response.data.favoriteCount !== undefined) {
                            if (favoriteCountBadge) {
                                favoriteCountBadge.textContent = response.data.favoriteCount;
                            }

                            if (favoriteCountBadgeMobile) {
                                favoriteCountBadgeMobile.textContent = response.data.favoriteCount;
                            }
                        }
                        const heartSpan = this.querySelector("span");

                        if (isFavorite) {
                            this.classList.remove("empty-heart");
                            this.classList.add("filled-heart");

                            heartSpan.textContent = "♥";
                            this.dataset.favorite = "true";

                            showFavoriteToast("Adăugat la favorite!");
                        } else {
                            this.classList.remove("filled-heart");
                            this.classList.add("empty-heart");

                            heartSpan.textContent = "♡";
                            this.dataset.favorite = "false";

                            showFavoriteToast("Șters din favorite!");
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        showFavoriteToast("Eroare actualizare favorite.");
                    });
            });
        });
    });
</script>

<!--Clickable card-->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".clickable-card").forEach(card => {
            card.addEventListener("click", function () {
                const url = this.dataset.url;

                if (url) {
                    window.location.href = url;
                }
            });
        });
    });
</script>

</body>
</html>
