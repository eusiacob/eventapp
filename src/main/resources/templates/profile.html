<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Profilul meu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="app-bg">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3">

    <div class="row justify-content-center">

        <div class="col-12 col-lg-9">

            <div class="profile-hero card border-0 shadow-lg p-4 p-md-5 mb-4">

                <div class="d-flex flex-column flex-md-row align-items-center gap-4">

                    <div class="profile-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>

                    <div class="text-center text-md-start flex-grow-1">

                        <span class="badge bg-dark mb-2"
                              th:text="${user.role}">
                            ROLE_USER
                        </span>

                        <h1 class="fw-bold mb-1">
                            Profilul meu
                        </h1>

                        <p class="text-muted mb-0"
                           th:text="${user.email}">
                            user@email.com
                        </p>

                    </div>

                </div>

            </div>

            <div class="row g-4 mb-4">

                <div class="col-12 col-md-6">
                    <div class="profile-stat-card card border-0 shadow-sm p-4 h-100">
                        <div class="d-flex align-items-center gap-3">
                            <div class="profile-stat-icon">
                                <i class="bi bi-heart-fill"></i>
                            </div>

                            <div>
                                <p class="text-muted mb-1">Favorite</p>
                                <h3 class="fw-bold mb-0"
                                    th:text="${favoriteCount}">
                                    0
                                </h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6" sec:authorize="hasRole('BUSINESS')">
                    <div class="profile-stat-card card border-0 shadow-sm p-4 h-100">
                        <div class="d-flex align-items-center gap-3">
                            <div class="profile-stat-icon dark">
                                <i class="bi bi-briefcase-fill"></i>
                            </div>

                            <div>
                                <p class="text-muted mb-1">Servicii create</p>
                                <h3 class="fw-bold mb-0"
                                    th:text="${businessCount}">
                                    0
                                </h3>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card border-0 shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">
                    Date cont
                </h4>

                <div class="profile-info-row">
                    <span>Email</span>
                    <strong th:text="${user.email}">email@test.com</strong>
                </div>

                <div class="profile-info-row">
                    <span>Cont</span>
                    <strong th:text="${user.role}">ROLE_USER</strong>
                </div>

            </div>

            <div class="card border-0 shadow-sm p-4">

                <h4 class="fw-bold mb-3">
                    Acțiuni rapide
                </h4>

                <div class="d-flex flex-column flex-md-row gap-2">

                    <a href="/favorites"
                       class="btn btn-outline-danger">
                        <i class="bi bi-heart me-1"></i>
                        Vezi favorite
                    </a>

                    <a href="/businesses"
                       class="btn btn-outline-dark">
                        <i class="bi bi-search me-1"></i>
                        Explorează servicii
                    </a>

                    <a sec:authorize="hasRole('BUSINESS')"
                       href="/business/create"
                       class="btn btn-dark">
                        <i class="bi bi-plus-lg me-1"></i>
                        Adaugă serviciu
                    </a>

                    <a sec:authorize="hasRole('BUSINESS')"
                       href="/dashboard"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-speedometer2 me-1"></i>
                        Dashboard
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
