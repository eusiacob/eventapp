<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="${profile.name}"></title>

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">


</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="card border-0 shadow-lg overflow-hidden">

        <!-- IMAGE -->
        <img class="details-image"
             th:if="${profile.imagePath != null}"
             th:src="@{${profile.imagePath}}">

        <img class="details-image"
             src="https://i.ibb.co/d4nzt6TB/Image-not-found.png"
             th:if="${profile.imagePath == null}">

        <!-- CONTENT -->
        <div class="p-5">

            <!-- CATEGORY -->
            <span class="badge bg-dark px-3 py-2 mb-3"
                  th:text="${profile.category.displayName}">
            </span>

            <!-- NAME -->
            <h1 class="fw-bold mb-3"
                th:text="${profile.name}">
            </h1>

            <div sec:authorize="isAuthenticated()">
                <!-- CITY -->
                <p class="text-muted fs-5">
                    📍 <span th:text="${profile.city}"></span>
                </p>

                <!-- PHONE -->
                <p class="fs-5">
                    📞 <span th:text="${profile.phone}"></span>
                </p>

                <hr>

                <!-- DESCRIPTION -->
                <h4 class="fw-bold mb-3">
                    About
                </h4>

                <p class="lead"
                   th:text="${profile.description}">
                </p>
            </div>

            <div class="alert alert-info" sec:authorize="isAnonymous()">
                <span>Trebuie să fii conectat pentru a vedea conținutul.</span>
            </div>

            <hr>

            <div class="mt-4">

                <h4 class="fw-bold mb-3">
                    Recenzii
                </h4>

                <div class="mb-4">
                    <span class="fs-4 text-warning">★</span>
                    <strong th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></strong>

                    (<span th:text="${reviewCount}"></span>
                    <span th:text="${reviewCount == 1 ? 'recenzie' : 'recenzii'}"></span>)
                </div>

                <div class="alert alert-danger" th:if="${param.reviewError}">
                    Adaugă o recenzie
                </div>

                <div class="alert alert-warning" th:if="${param.alreadyReviewed}">
                    Ai adăugat deja o recenzie.
                </div>

                <div sec:authorize="isAuthenticated()" th:if="${!hasReviewed}">
                    <form class="card p-4 shadow-sm mb-4"
                          method="post"
                          th:action="@{/business/{businessId}/reviews(businessId=${profile.id})}"
                          th:object="${review}">

                        <div class="mb-3">
                            <label class="form-label">Rating</label>
                            <select class="form-select" th:field="*{rating}">
                                <option value="5">★★★★★ - Excelent</option>
                                <option value="4">★★★★ - Foarte bun</option>
                                <option value="3">★★★ - Bun</option>
                                <option value="2">★★ - Slab</option>
                                <option value="1">★ - Foarte slab</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Comentariu</label>
                            <textarea class="form-control"
                                      placeholder="Write your review..."
                                      rows="3"
                                      th:field="*{comment}"></textarea>
                        </div>

                        <button class="btn btn-dark" type="submit">
                            Adaugă recenzie
                        </button>

                    </form>
                </div>

                <div class="alert alert-info" sec:authorize="isAnonymous()">
                    Trebuie să fii conectat pentru a adăuga un review.
                </div>

                <div class="alert alert-success" th:if="${hasReviewed}">
                    Ai adăugat deja un review.
                </div>

                <div class="text-muted" th:if="${#lists.isEmpty(reviews)}">
                    Nici o recenzie.
                </div>

                <div class="card p-3 mb-3 shadow-sm" th:each="r : ${reviews}">

                    <div class="d-flex justify-content-between">

                        <strong th:text="${r.user.firstName + ' ' + r.user.lastName}">
                            Utilizator
                        </strong>

                        <span class="text-warning">
                            <span th:each="i : ${#numbers.sequence(1, r.rating)}">★</span>
                        </span>

                    </div>

                    <p class="mb-0 mt-2" th:text="${r.comment}"></p>

                </div>

            </div>

            <div class="mt-3" sec:authorize="isAuthenticated()">

                <button class="btn favorite-details-btn"
                        id="detailsFavoriteBtn"
                        th:classappend="${isFavorite} ? ' btn-danger' : ' btn-outline-danger'"
                        th:data-business-id="${profile.id}"
                        type="button">

                    <span id="detailsFavoriteIcon"
                          th:text="${isFavorite} ? '♥' : '♡'">
                    </span>

                    <span id="detailsFavoriteText"
                          th:text="${isFavorite} ? 'Șterge de la favorite' : 'Adaugă la favorite'">

                    </span>
                </button>

            </div>

        </div>

    </div>

</div>

<!--ADD/REMOVE FAVORITES MESSAGE-->
<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div id="favoriteToast"
         class="toast align-items-center bg-success border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">

            <div id="favoriteToastMessage"
                 class="toast-body">
                Favorite updated.
            </div>

            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"
                    aria-label="Close">
            </button>

        </div>

    </div>

</div>

<!--IMPORTS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


<!--ADD/REMOVE FROM FAVORITES-->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const favoriteBtn = document.getElementById("detailsFavoriteBtn");

        if (!favoriteBtn) {
            return;
        }

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

        function showFavoriteToast(message) {
            const toastElement = document.getElementById("favoriteToast");
            const toastMessage = document.getElementById("favoriteToastMessage");

            if (!toastElement || !toastMessage) {
                return;
            }

            toastMessage.textContent = message;

            const toast = new bootstrap.Toast(toastElement, {
                delay: 1800
            });

            toast.show();
        }

        favoriteBtn.addEventListener("click", function () {
            const businessId = this.dataset.businessId;

            axios.post(`/favorites/toggle/${businessId}`, {}, {
                headers: csrfHeader && csrfToken ? {
                    [csrfHeader]: csrfToken
                } : {}
            })
                .then(response => {
                    const isFavorite = response.data.favorite;

                    const favoriteCountBadge = document.getElementById("favoriteCountBadge");

                    if (favoriteCountBadge && response.data.favoriteCount !== undefined) {
                        favoriteCountBadge.textContent = response.data.favoriteCount;
                    }

                    const icon = document.getElementById("detailsFavoriteIcon");
                    const text = document.getElementById("detailsFavoriteText");

                    if (isFavorite) {
                        favoriteBtn.classList.remove("btn-outline-danger");
                        favoriteBtn.classList.add("btn-danger");

                        icon.textContent = "♥";
                        text.textContent = "Remove from Favorites";

                        showFavoriteToast("Added to favorites");
                    } else {
                        favoriteBtn.classList.remove("btn-danger");
                        favoriteBtn.classList.add("btn-outline-danger");

                        icon.textContent = "♡";
                        text.textContent = "Add to Favorites";

                        showFavoriteToast("Removed from favorites");
                    }
                })
                .catch(error => {
                    console.error(error);
                    showFavoriteToast("Could not update favorites");
                });
        });
    });
</script>

</body>
</html>
