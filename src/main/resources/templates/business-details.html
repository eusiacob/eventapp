<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Business Details</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="mb-0" th:text="${profile.name}"></h1>

        <a class="btn btn-outline-light"
           href="/">
            Back
        </a>

    </div>

<!--  BUSINESS DETAILS  -->
    <div class="card shadow p-4 opacity-75">

        <p>
            <strong>Category:</strong>
            <span th:text="${profile.category}"></span>
        </p>

        <p>
            <strong>City:</strong>
            <span th:text="${profile.city}"></span>
        </p>

        <p>
            <strong>Phone:</strong>
            <span th:text="${profile.phone}"></span>
        </p>

        <p>
            <strong>Description:</strong>
            <span th:text="${profile.description}"></span>
        </p>


    </div>

</div>
</body>
</html>
