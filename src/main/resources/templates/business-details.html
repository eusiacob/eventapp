<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Business Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="card border-0 shadow-lg overflow-hidden">

        <!-- IMAGE -->
        <img th:if="${profile.imagePath != null}"
             th:src="@{${profile.imagePath}}"
             class="details-image">

        <img th:if="${profile.imagePath == null}"
             src="https://via.placeholder.com/1200x500"
             class="details-image">

        <!-- CONTENT -->
        <div class="p-5">

            <!-- CATEGORY -->
            <span class="badge bg-dark px-3 py-2 mb-3"
                  th:text="${profile.category}">
            </span>

            <!-- NAME -->
            <h1 class="fw-bold mb-3"
                th:text="${profile.name}">
            </h1>

            <!-- CITY -->
            <p class="text-muted fs-5">
                📍 <span th:text="${profile.city}"></span>
            </p>

            <!-- PHONE -->
            <p class="fs-5">
                📞 <span th:text="${profile.phone}"></span>
            </p>

            <hr>

            <!-- DESCRIPTION -->
            <h4 class="fw-bold mb-3">
                About
            </h4>

            <p class="lead"
               th:text="${profile.description}">
            </p>

            <form th:action="@{/favorites/add/{id}(id=${profile.id})}"
                  method="post">

                <button class="btn btn-danger mt-3">
                    ❤️ Add to Favorites
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
