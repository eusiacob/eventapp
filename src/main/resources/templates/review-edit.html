<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Edit Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="app-bg">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow-lg border-0 p-4">

                <h2 class="fw-bold mb-4 text-center">
                    Edit Review
                </h2>

                <form method="post"
                      th:action="@{/reviews/edit/{id}(id=${review.id})}"
                      th:object="${review}">

                    <div class="mb-3">
                        <label class="form-label">Rating</label>

                        <select class="form-select"
                                th:field="*{rating}">
                            <option value="5">★★★★★ - Excelent</option>
                            <option value="4">★★★★ - Foarte bun</option>
                            <option value="3">★★★ - Bun</option>
                            <option value="2">★★ - Slab</option>
                            <option value="1">★ - Foarte slab</option>
                        </select>

                        <div class="text-danger small mt-1"
                             th:errors="*{rating}"
                             th:if="${#fields.hasErrors('rating')}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Comentariu</label>

                        <textarea class="form-control"
                                  placeholder="Scrie noua recenzie..."
                                  required
                                  rows="5"
                                  th:field="*{comment}"></textarea>

                        <div class="text-danger small mt-1"
                             th:errors="*{comment}"
                             th:if="${#fields.hasErrors('comment')}">
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-md-row gap-2 justify-content-between">

                        <a class="btn btn-outline-secondary"
                           th:href="@{/business/{id}(id=${review.businessProfile.id})}">
                            Anulare
                        </a>

                        <button class="btn btn-dark"
                                type="submit">
                            Modifică
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
