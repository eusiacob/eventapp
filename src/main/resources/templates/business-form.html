<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Create Business</title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body style="overflow: auto">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- PAGE -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg p-4 opacity-75">

                <h2 class="text-center mb-4">
                    Adaugă serviciu
                </h2>

                <form enctype="multipart/form-data"
                      method="post"
                      th:action="@{/business/create}"
                      th:object="${profile}">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label class="form-label">Nume serviciu</label>
                        <input class="form-control"
                               placeholder="e.g. Dream Events"
                               th:field="*{name}"
                               type="text">
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{name}"
                         th:if="${#fields.hasErrors('name')}">
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Categorie</label>
                        <select class="form-select"
                                th:field="*{category}">

                            <option th:each="cat : ${categories}"
                                    th:text="${cat.displayName}"
                                    th:value="${cat}">
                            </option>

                        </select>
                    </div>

                    <!-- CITY -->
                    <div class="mb-3">
                        <label class="form-label">Oraș</label>
                        <input class="form-control"
                               placeholder="e.g. Bucharest"
                               th:field="*{city}"
                               type="text">
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{city}"
                         th:if="${#fields.hasErrors('city')}">
                    </div>

                    <!-- PHONE -->
                    <div class="mb-3">
                        <label class="form-label">Telefon</label>
                        <input class="form-control"
                               placeholder="07xx xxx xxx"
                               th:field="*{phone}"
                               type="text">
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{phone}"
                         th:if="${#fields.hasErrors('phone')}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Business email</label>
                        <input type="email"
                               class="form-control"
                               th:field="*{email}">
                    </div>

                    <div class="text-danger small mb-3"
                         th:errors="*{email}"
                         th:if="${#fields.hasErrors('email')}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url"
                               class="form-control"
                               th:field="*{website}"
                               placeholder="www.serviciul-meu.ro">
                    </div>

                    <!-- IMAGE-->
                    <div class="mb-3">
                        <label class="form-label">Imagine</label>
                        <input class="form-control"
                               name="imageFile"
                               type="file">
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="mb-3">
                        <label class="form-label">Descriere</label>
                        <textarea class="form-control"
                                  placeholder="Descrie serviciul...."
                                  rows="4"
                                  th:field="*{description}"></textarea>
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{description}"
                         th:if="${#fields.hasErrors('description')}">
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between">

                        <a class="btn btn-outline-secondary"
                           href="/dashboard">
                            Renunță
                        </a>

                        <button class="btn btn-success"
                                type="submit">
                            Adăugare
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
