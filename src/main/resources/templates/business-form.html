<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Create Business</title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body style="overflow: auto">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- PAGE -->
<div class="container mt-2">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg p-4 opacity-75">

                <h2 class="text-center mb-4">
                    Adaugă serviciu
                </h2>

                <form enctype="multipart/form-data"
                      method="post"
                      th:action="@{/business/create}"
                      th:object="${profile}">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label class="form-label">Nume serviciu</label>
                        <input class="form-control"
                               placeholder="e.g. Dream Events"
                               th:field="*{name}"
                               type="text">
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{name}"
                         th:if="${#fields.hasErrors('name')}">
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Categorie</label>
                        <select class="form-select"
                                th:field="*{category}">

                            <option th:each="cat : ${categories}"
                                    th:text="${cat.displayName}"
                                    th:value="${cat}">
                            </option>

                        </select>
                    </div>

                    <!-- CITY -->
                    <div class="mb-3">
                        <label class="form-label">Județ</label>

                        <select class="form-select"
                                th:field="*{city}">
                            <option value="">Selectează județul</option>

                            <option value="Alba">Alba</option>
                            <option value="Arad">Arad</option>
                            <option value="Argeș">Argeș</option>
                            <option value="Bacău">Bacău</option>
                            <option value="Bihor">Bihor</option>
                            <option value="Bistrița-Năsăud">Bistrița-Năsăud</option>
                            <option value="Botoșani">Botoșani</option>
                            <option value="Brașov">Brașov</option>
                            <option value="Brăila">Brăila</option>
                            <option value="București">București</option>
                            <option value="Buzău">Buzău</option>
                            <option value="Caraș-Severin">Caraș-Severin</option>
                            <option value="Călărași">Călărași</option>
                            <option value="Cluj">Cluj</option>
                            <option value="Constanța">Constanța</option>
                            <option value="Covasna">Covasna</option>
                            <option value="Dâmbovița">Dâmbovița</option>
                            <option value="Dolj">Dolj</option>
                            <option value="Galați">Galați</option>
                            <option value="Giurgiu">Giurgiu</option>
                            <option value="Gorj">Gorj</option>
                            <option value="Harghita">Harghita</option>
                            <option value="Hunedoara">Hunedoara</option>
                            <option value="Ialomița">Ialomița</option>
                            <option value="Iași">Iași</option>
                            <option value="Ilfov">Ilfov</option>
                            <option value="Maramureș">Maramureș</option>
                            <option value="Mehedinți">Mehedinți</option>
                            <option value="Mureș">Mureș</option>
                            <option value="Neamț">Neamț</option>
                            <option value="Olt">Olt</option>
                            <option value="Prahova">Prahova</option>
                            <option value="Satu Mare">Satu Mare</option>
                            <option value="Sălaj">Sălaj</option>
                            <option value="Sibiu">Sibiu</option>
                            <option value="Suceava">Suceava</option>
                            <option value="Teleorman">Teleorman</option>
                            <option value="Timiș">Timiș</option>
                            <option value="Tulcea">Tulcea</option>
                            <option value="Vaslui">Vaslui</option>
                            <option value="Vâlcea">Vâlcea</option>
                            <option value="Vrancea">Vrancea</option>
                        </select>
                    </div>

                    <div class="text-danger small mb-3"
                         th:errors="*{city}"
                         th:if="${#fields.hasErrors('city')}">
                    </div>

                    <!-- PHONE -->
                    <div class="mb-3">
                        <label class="form-label">Telefon</label>
                        <input class="form-control"
                               placeholder="07xx xxx xxx"
                               th:field="*{phone}"
                               type="text">
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{phone}"
                         th:if="${#fields.hasErrors('phone')}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Business email</label>
                        <input type="email"
                               class="form-control"
                               placeholder="myservice@mail.com"
                               th:field="*{email}">
                    </div>

                    <div class="text-danger small mb-3"
                         th:errors="*{email}"
                         th:if="${#fields.hasErrors('email')}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url"
                               class="form-control"
                               th:field="*{website}"
                               placeholder="www.serviciul-meu.ro">
                    </div>

                    <!-- IMAGE-->
                    <div class="mb-3">
                        <label class="form-label">Imagine de profil</label>
                        <input class="form-control"
                               name="imageFile"
                               type="file">
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="mb-3">
                        <label class="form-label">Descriere</label>
                        <textarea class="form-control"
                                  placeholder="Descrie serviciul...."
                                  rows="4"
                                  th:field="*{description}"></textarea>
                    </div>
                    <div class="text-danger small mb-3"
                         th:errors="*{description}"
                         th:if="${#fields.hasErrors('description')}">
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between">

                        <a class="btn btn-outline-secondary"
                           href="/dashboard">
                            Renunță
                        </a>

                        <button class="btn btn-success"
                                type="submit">
                            Adăugare
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
