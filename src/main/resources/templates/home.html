<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h1 class="mb-4">Business Profiles</h1>


    <!--    SEARCH BAR-->
    <form action="/"
          class="row align-items-end opacity-75"
          method="get">

        <div class="col">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Name of Business"
                   th:value="${keyword}">
        </div>

        <div class="col">
            <input class="form-control"
                   name="category"
                   placeholder="Category"
                   th:value="${category}"
                   type="text">
        </div>

        <div class="col">
            <input class="form-control"
                   name="city"
                   placeholder="City"
                   th:value="${city}"
                   type="text">
        </div>

        <div class="col-auto">
            <button class="btn btn-outline-light w-100"
                    type="submit">
                Search
            </button>
        </div>

    </form>

</div>
<!--BUSINESSES-->
<div class="container mt-4">

    <div class="row">

        <div th:if="${#lists.isEmpty(businesses)}"
             class="alert alert-warning">
            No businesses found.
        </div>

        <div class="col-md-4 mb-4"
             th:each="b : ${businesses}">

            <div class="card opacity-75 h-100 shadow-sm">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${b.name}">
                    </h5>

                    <hr/>

                    <p class="card-text">
                        <strong>Category:</strong>
                        <span th:text="${b.category}"></span>
                    </p>

                    <p class="card-text">
                        <strong>City:</strong>
                        <span th:text="${b.city}"></span>
                    </p>

                    <img class="img-fluid rounded mb-2"
                         style="height:200px; object-fit:cover;"
                         th:if="${b.imagePath != null}"
                         th:src="@{${b.imagePath}}">

                    <img class="img-fluid rounded mb-2"
                         src="https://via.placeholder.com/300x200"
                         th:if="${b.imagePath == null}">
                    <p>
                        <a class="btn btn-primary"
                           th:href="@{/business/{id}(id=${b.id})}">
                            View Profile
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
