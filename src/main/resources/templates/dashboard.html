<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Serviciile mele</title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- PAGE -->
<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0 text-dark">
            Serviciile mele
        </h2>

        <a class="btn btn-success"
           href="/business/create">
            + Adaugă serviciu
        </a>

    </div>

    <!-- EMPTY STATE -->
    <div class="alert alert-info opacity-75"
         th:if="${#lists.isEmpty(profiles)}">
        Încă nu ai nici un serviciu.
    </div>


    <div th:if="${param.businessCreated}" class="alert alert-success">
        Serviciu adăugat!
    </div>

    <div th:if="${param.businessDeleted}" class="alert alert-success">
        Serviciu șters!
    </div>

    <!-- CARDS -->
    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="p : ${profiles}">
            <a class="business-card-link" th:href="@{/business/{id}(id=${p.id})}">
                <div class="card shadow-sm h-100">

                    <div class="card-body">

                        <h5 class="card-title"
                            th:text="${p.name}">
                        </h5>

                        <p class="card-text mb-1">
                            <strong>Categorie:</strong>
                            <span th:text="${p.category.displayName}"></span>
                        </p>

                        <p class="card-text mb-1">
                            <strong>Oraș:</strong>
                            <span th:text="${p.city}"></span>
                        </p>

                        <p class="card-text mb-3">
                            <strong>Telefon:</strong>
                            <span th:text="${p.phone}"></span>
                        </p>

                        <img alt="business profile picture"
                             class="img-fluid rounded mb-2"
                             style="height:200px; object-fit:cover;"
                             th:if="${p.imagePath != null}"
                             th:src="@{${p.imagePath}}">

                        <div class="d-flex gap-2">

                            <a class="btn btn-outline-dark w-100"
                               th:href="@{/business/edit/{id}(id=${p.id})}" onclick="">
                                Modifică
                            </a>

                            <form method="post"
                                  th:action="@{/business/delete/{id}(id=${p.id})}">

                                <button class="btn btn-outline-danger w-100"
                                        onclick="return confirm('Ești sigur că vrei să ștergi acest serviciu?')"
                                        type="submit">
                                    Șterge
                                </button>

                            </form>

                        </div>

                    </div>

                </div>
            </a>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
